name: Kuitti
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM: <TEAMID>   # set for device builds; simulator needs no signing
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

targets:
  Kuitti:
    type: application
    platform: iOS
    sources:
      - path: Kuitti
    info:
      path: Kuitti/Support/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Kuitti uses the camera to photograph receipts and scan product barcodes."
        NSFaceIDUsageDescription: "Kuitti uses Face ID to unlock the app when App Lock is enabled."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.kuitti
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  KuittiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KuittiTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kuitti

schemes:
  Kuitti:
    build:
      targets:
        Kuitti: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KuittiTests
