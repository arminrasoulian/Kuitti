name: Kuitti
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    CODE_SIGN_STYLE: Automatic
    # DEVELOPMENT_TEAM: <TEAMID>   # set for device builds; simulator needs no signing
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0"

targets:
  Kuitti:
    type: application
    platform: iOS
    sources:
      - path: Kuitti
    info:
      path: Kuitti/Support/Info.plist
      properties:
        # Static launch screen: spruce field + the Kuitti receipt mark, centered.
        # SplashView then matches this exact frame and animates the trend on top,
        # so the hand-off from launch image to animated splash is seamless.
        UILaunchScreen:
          UIColorName: LaunchBG
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: "Kuitti uses the camera to photograph receipts and scan product barcodes."
        NSFaceIDUsageDescription: "Kuitti uses Face ID to unlock the app when App Lock is enabled."
        # Accept receipt images/PDFs shared from other apps ("Copy to Kuitti") and opened
        # from Files. Copied into the app Inbox (not in-place) and handled via .onOpenURL.
        CFBundleDocumentTypes:
          - CFBundleTypeName: Receipt
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.image
              - com.adobe.pdf
        LSSupportsOpeningDocumentsInPlace: false
        # The backup file type. Declared (not in CFBundleDocumentTypes) so the in-app
        # restore file picker and ShareLink recognize "*.kuittibackup".
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.personal.kuitti.backup
            UTTypeDescription: Kuitti Backup
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification:
              public.filename-extension:
                - kuittibackup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.kuitti
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        # Extract Text("…") LocalizedStringKey literals into Localizable.xcstrings on build,
        # so adding a UI language later is drop-in.
        SWIFT_EMIT_LOC_STRINGS: YES

  KuittiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KuittiTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Kuitti

schemes:
  Kuitti:
    build:
      targets:
        Kuitti: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KuittiTests
